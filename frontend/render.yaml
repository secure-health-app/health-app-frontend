routes:
  - type: rewrite
    source: /*
    destination: /index.html

headers:
  - path: /*
    name: X-Frame-Options
    value: DENY

  - path: /*
    name: Content-Security-Policy
    value: default-src 'self'; frame-ancestors 'none';

  - path: /*
    name: X-Content-Type-Options
    value: nosniff